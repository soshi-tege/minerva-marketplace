services:
  - type: web
    name: minerva-marketplace-api
    runtime: python
    region: oregon
    buildCommand: cd backend && ./build.sh
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: minerva-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://minerva-marketplace.vercel.app
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: PORT
        value: 10000

databases:
  - name: minerva-db
    databaseName: minerva
    user: minerva
    region: oregon
