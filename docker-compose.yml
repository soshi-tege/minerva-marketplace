services:
  backend:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/minerva
      PYTHONPATH: /app
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "5001:5001"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: minerva
    ports:
      - "5433:5432"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_ORIGIN: http://localhost:5001
    depends_on:
      - backend
